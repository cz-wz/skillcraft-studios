<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillCraft Studios | Blueprint</title>
    <style>
        :root {
            --primary: #0055ff;
            --accent: #ff6600;
            --bg: #f0f4f8;
            --grid: rgba(0, 85, 255, 0.1);
        }
        body {
            font-family: 'Courier New', monospace;
            background-color: var(--bg);
            background-image: radial-gradient(var(--grid) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #333;
            margin: 0; padding: 20px;
        }
        header {
            border: 2px solid var(--primary);
            padding: 2rem;
            background: white;
            box-shadow: 8px 8px 0px var(--primary);
            margin-bottom: 2rem;
        }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card {
            background: white;
            border: 1px solid #ccc;
            padding: 1.5rem;
            position: relative;
        }
        .card::before {
            content: "REF. NO " attr(data-id);
            font-size: 0.7rem;
            color: var(--primary);
            position: absolute; top: 5px; right: 5px;
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn:hover { background: var(--accent); }
    </style>
</head>
<body>
    <header>
        <h1>SKILLCRAFT_STUDIOS // v1.0</h1>
        <p>Honing skills. Solving real-world problems.</p>
    </header>
    <div class="container">
        <div class="card" data-id="SC-001">
            <h3>Intro to Robotics</h3>
            <p>Build a sensor-based obstacle avoider.</p>
            <button class="btn" onclick="alert('RSVP Logic goes here!')">RSVP ($45)</button>
        </div>
        <div class="card" data-id="SC-002">
            <h3>3D Printing Lab</h3>
            <p>Prototyping parts for local water filters.</p>
            <button class="btn">RSVP ($30)</button>
        </div>
    </div>
</body>
</html>
