<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Grid Resizer</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Align to the top for the legend column */
            min-height: 100vh;
            margin: 20px;
            background-color: #f0f0f0;
            gap: 40px; /* Space between legend and grid */
        }

        #legend-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            position: sticky; /* Makes it stay on screen if scrolling were enabled */
            top: 20px; /* Distance from the top */
        }

        .legend-square {
            width: 50px;
            height: 50px;
            border: 2px solid #ccc;
            cursor: grab;
            transition: border-color 0.2s ease;
            box-sizing: border-box; /* Include padding and border in the element's total width and height */
        }

        .legend-square:active {
            cursor: grabbing;
        }

        /* Colors for legend and grid squares */
        .red { background-color: #e74c3c; }
        .blue { background-color: #3498db; }
        .green { background-color: #2ecc71; }
        .orange { background-color: #f39c12; }

        #grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columns */
            grid-template-rows: repeat(4, 1fr);    /* 4 rows */
            gap: 10px; /* Space between grid squares */
            width: 600px; /* Fixed width for the grid */
            height: 600px; /* Fixed height for the grid */
            padding: 10px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .grid-square {
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #ddd;
            box-sizing: border-box;
            transition: width 0.3s ease, height 0.3s ease; /* Smooth size transition */
        }
    </style>
</head>
<body>

    <div id="legend-column">
        </div>

    <div id="grid-container">
        </div>

    <script>
        const legendColumn = document.getElementById('legend-column');
        const gridContainer = document.getElementById('grid-container');

        const colors = ['red', 'blue', 'green', 'orange'];
        const numSquaresPerColor = 4;
        const totalGridSquares = 16;

        // Base size for the largest and smallest squares
        const BASE_SIZE_PX = 150; // Each cell in the 4x4 grid is roughly 150px x 150px without gap
        const SIZE_RANGE_PX = 120; // Max difference between largest and smallest size (e.g., 150 +/- 20)

        let legendOrder = [...colors]; // Initialize legend order
        let draggedLegendItem = null; // To store the legend item being dragged

        // Function to shuffle an array (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // --- Grid Generation ---
        function createGrid() {
            gridContainer.innerHTML = ''; // Clear existing grid
            let allGridColors = [];
            colors.forEach(color => {
                for (let i = 0; i < numSquaresPerColor; i++) {
                    allGridColors.push(color);
                }
            });
            shuffleArray(allGridColors); // Randomize colors

            allGridColors.forEach(color => {
                const square = document.createElement('div');
                square.classList.add('grid-square', color);
                gridContainer.appendChild(square);
            });
        }

        // --- Legend Generation ---
        function createLegend() {
            legendColumn.innerHTML = ''; // Clear existing legend
            legendOrder.forEach(color => {
                const legendSquare = document.createElement('div');
                legendSquare.classList.add('legend-square', color);
                legendSquare.dataset.color = color; // Store color as data attribute
                legendSquare.setAttribute('draggable', true); // Make it draggable
                legendColumn.appendChild(legendSquare);
            });
        }

        // --- Resizing Logic ---
        function updateGridSquareSizes() {
            // Define size steps based on the number of legend items (4 colors)
            // Example:
            // Top (index 0): Largest
            // Second (index 1): Smaller
            // Third (index 2): Even Smaller
            // Bottom (index 3): Smallest

            const sizeSteps = [
                BASE_SIZE_PX + SIZE_RANGE_PX / 2, // Largest
                BASE_SIZE_PX + SIZE_RANGE_PX / 6, // Larger middle
                BASE_SIZE_PX - SIZE_RANGE_PX / 6, // Smaller middle
                BASE_SIZE_PX - SIZE_RANGE_PX / 2  // Smallest
            ];

            legendOrder.forEach((color, index) => {
                const targetSize = sizeSteps[index];
                document.querySelectorAll(`.grid-square.${color}`).forEach(square => {
                    square.style.width = `${targetSize}px`;
                    square.style.height = `${targetSize}px`;
                });
            });
        }

        // --- Drag and Drop Logic for Legend ---

        legendColumn.addEventListener('dragstart', (e) => {
            draggedLegendItem = e.target.closest('.legend-square');
            if (draggedLegendItem) {
                e.dataTransfer.effectAllowed = 'move';
                // Add a slight delay to remove the class, allowing the browser to capture the initial element state for dragging
                setTimeout(() => {
                    draggedLegendItem.classList.add('dragging');
                }, 0);
            }
        });

        legendColumn.addEventListener('dragover', (e) => {
            e.preventDefault(); // Necessary to allow dropping
            const target = e.target.closest('.legend-square');
            if (target && draggedLegendItem && target !== draggedLegendItem) {
                // Determine if we're dragging over the top or bottom half of the target
                const rect = target.getBoundingClientRect();
                const centerY = rect.top + rect.height / 2;

                if (e.clientY < centerY) {
                    // Dragging over the top half, insert before
                    legendColumn.insertBefore(draggedLegendItem, target);
                } else {
                    // Dragging over the bottom half, insert after
                    legendColumn.insertBefore(draggedLegendItem, target.nextSibling);
                }
            }
        });

        legendColumn.addEventListener('dragend', (e) => {
            if (draggedLegendItem) {
                draggedLegendItem.classList.remove('dragging');
                draggedLegendItem = null;
            }
            // Update the legendOrder array based on the new DOM order
            legendOrder = Array.from(legendColumn.children).map(item => item.dataset.color);
            updateGridSquareSizes(); // Recalculate sizes after drag
        });


        // --- Initial Setup ---
        document.addEventListener('DOMContentLoaded', () => {
            createLegend();
            createGrid();
            updateGridSquareSizes(); // Set initial sizes
        });

    </script>
</body>
</html>
