<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Speech Helper</title>
    
    <script src="https://unpkg.com/compromise"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; text-align: center; }
        #controls { margin: 20px 0; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 50px; transition: 0.2s; }
        button:hover { background: #0056b3; }
        button.recording { background: #dc3545; animation: pulse 1.5s infinite; }
        
        #transcript-box { min-height: 60px; font-size: 1.5rem; color: #555; margin-bottom: 30px; padding: 10px; border-bottom: 2px solid #eee; }
        
        #icon-display { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        
        .concept-card { display: flex; flex-direction: column; align-items: center; width: 120px; animation: popIn 0.3s ease-out; }
        .icon { font-size: 5rem; line-height: 1; margin-bottom: 10px; }
        .label { font-size: 1.2rem; font-weight: bold; color: #333; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
        
        .note { font-size: 0.9rem; color: #888; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>Visual Speech Helper</h1>
    <p>Speak clearly, and I will show you the main ideas.</p>

    <div id="controls">
        <button id="toggleBtn">🎙️ Start Listening</button>
    </div>

    <div id="transcript-box">Listening for speech...</div>
    <div id="icon-display"></div>

    <p class="note">Try saying: "The dog is running fast" or "I ate an apple"</p>

<script>
    // --- 1. EMOJI DICTIONARY (Expand this list!) ---
    // The keys should be the "Root" words (lemmas). 
    // e.g. use "run", not "running" or "ran"
    const emojiMap = {
        // Verbs
        "run": "🏃", "walk": "🚶", "eat": "🍽️", "drink": "🥤",
        "sleep": "😴", "read": "📖", "write": "✍️", "play": "🎮",
        "go": "➡️", "stop": "🛑", "take": "🤲", "give": "🎁",
        "look": "👀", "listen": "👂", "sit": "🪑", "stand": "🧍",
        "love": "❤️", "like": "👍", "jump": "🦘", "swim": "🏊",
        
        // Nouns
        "book": "📕", "apple": "🍎", "dog": "🐕", "cat": "🐈",
        "car": "🚗", "bus": "🚌", "school": "🏫", "home": "🏠",
        "teacher": "👩‍🏫", "student": "🧑‍🎓", "friend": "🤝",
        "water": "💧", "food": "🍕", "ball": "⚽", "music": "🎵",
        "backpack": "🎒", "pencil": "✏️", "phone": "📱",
        
        // Adjectives/Feelings
        "happy": "😊", "sad": "😢", "angry": "😠", "tired": "🥱",
        "fast": "🐇", "slow": "🐢", "big": "🐘", "small": "🐜",
        "hot": "🔥", "cold": "❄️", "good": "✅", "bad": "❌",

        // --- Academic Subjects & Activities ---
        "math": "➕",
        "calculate": "🧮",
        "science": "🧪",
        "experiment": "⚗️",
        "history": "📜",
        "reading": "📖",
        "writing": "📝",
        "spelling": "🔤",
        "geography": "🌍",
        "music": "🎵",
        "sing": "🎤",

        // --- Art Class ---
        "art": "🎨",
        "paint": "🖌️",
        "draw": "🖍️",
        "color": "🌈",
        "glue": "🧴",
        "cut": "✂️",
        "paper": "📄",
        "clay": "🏺",

        // --- Sports & PE ---
        "gym": "🏀",
        "sports": "⚽",
        "exercise": "🏋️",
        "run": "🏃",
        "jump": "🦘",
        "catch": "🤲",
        "throw": "☄️",
        "climb": "🧗",
        "stretch": "🧘",
        "game": "🎲",

        // --- Lunch, Cafeteria & Health ---
        "lunch": "🍱",
        "cafeteria": "🍴",
        "eat": "😋",
        "drink": "🥤",
        "water": "💧",
        "milk": "🥛",
        "food": "🍎",
        "tray": "🍱",
        "bathroom": "🚻",
        "nurse": "🏥",
        "wash": "🧼",

        // --- Transportation & Arrival ---
        "bus": "🚌",
        "backpack": "🎒",
        "home": "🏠",
        "school": "🏫",
        "coat": "🧥",
        "shoes": "👟",
        "line": "🚶‍♂️",

        // --- Materials & Equipment ---
        "notebook": "📓",
        "binder": "📁",
        "folder": "📂",
        "pencil": "✏️",
        "pen": "🖋️",
        "marker": "🖊️",
        "eraser": "🧽",
        "ruler": "📏",
        "scissors": "✂️",
        "computer": "💻",
        "tablet": "📱",
        "projector": "📽️",
        "whiteboard": "⬜",
        "desk": "🪑",
        "chair": "🪑",
        "table": "🧱",
        "clock": "⏰",

        // --- Library & Books ---
        "library": "📚",
        "book": "📕",
        "shelf": "🗄️",
        "quiet": "🤫",
        "story": "🎭",

        // --- Verbs & Transitions ---
        "look": "👀",
        "listen": "👂",
        "think": "🤔",
        "sit": "🪑",
        "stand": "🧍",
        "wait": "⏳",
        "stop": "🛑",
        "go": "🟢",
        "help": "🤝",
        "share": "🤲",
        "finish": "🏁",
        "start": "🎬",
        "transition": "🔄",
        "clean": "🧹",
        "work": "📁",
        "play": "🪁"
    };

    // --- 2. SPEECH RECOGNITION SETUP ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isRecording = false;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true; // Keep listening even if user pauses
        recognition.lang = 'en-US';
        recognition.interimResults = false; // Only show final results

        recognition.onresult = (event) => {
            const lastResultIndex = event.results.length - 1;
            const transcript = event.results[lastResultIndex][0].transcript;
            
            document.getElementById('transcript-box').innerText = `"${transcript}"`;
            processTextToIcons(transcript);
        };

        recognition.onerror = (event) => {
            console.error("Speech Error:", event.error);
            document.getElementById('toggleBtn').innerText = "❌ Error (Check Console)";
        };
        
        recognition.onend = () => {
             if(isRecording) recognition.start(); // Auto-restart if it cuts out
        };
    } else {
        alert("Your browser does not support Speech Recognition. Please use Google Chrome.");
    }

    // --- 3. NLP PROCESSING LOGIC ---
    function processTextToIcons(text) {
        const display = document.getElementById('icon-display');
        display.innerHTML = ''; // Clear previous icons

        // Use 'Compromise' library to parse the text
        let doc = nlp(text);

        // Normalize: expand contractions (I'm -> I am), remove punctuation
        doc.normalize();

        // We want to extract key terms. 
        // Strategy: Grab verbs, nouns, and adjectives.
        // We convert them to their "root" form (lemma) so "running" matches "run".
        let terms = doc.terms().out('array'); 
        
        // We can access detailed data using the .json() output from Compromise
        let data = doc.terms().json();

        data.forEach(termData => {
            let wordInfo = termData.terms[0];
            let rawWord = wordInfo.text.toLowerCase();
            let rootWord = wordInfo.normal; // 'normal' often gives the lemma (run for running)
            
            // Sometimes 'normal' isn't perfect for verbs, so we can try to get the verb root explicitly
            if (wordInfo.tags.includes('Verb')) {
                // Compromise trick to get infinitive form
                let verbRoot = nlp(rawWord).verbs().toInfinitive().text();
                if (verbRoot) rootWord = verbRoot;
            }

            // FILTER: We generally ignore "stop words" (is, the, a, to)
            // We check if our emoji map has the word. 
            // We check the Root word first (best match), then the raw word.
            
            let icon = emojiMap[rootWord] || emojiMap[rawWord];

            // Special handling for phrasal verbs could go here
            // e.g. check if current word is "take" and next is "out"

            if (icon) {
                createIconCard(icon, rootWord);
            } else {
                // Optional: If no icon found, do we show the word text anyway?
                // For this prototype, we only show words we have pictures for.
            }
        });
    }

    function createIconCard(emoji, text) {
        const div = document.createElement('div');
        div.className = 'concept-card';
        div.innerHTML = `
            <div class="icon">${emoji}</div>
            <div class="label">${text}</div>
        `;
        document.getElementById('icon-display').appendChild(div);
    }

    // --- 4. BUTTON HANDLER ---
    document.getElementById('toggleBtn').addEventListener('click', () => {
        if (!isRecording) {
            recognition.start();
            isRecording = true;
            document.getElementById('toggleBtn').classList.add('recording');
            document.getElementById('toggleBtn').innerText = "⏹️ Stop Listening";
        } else {
            recognition.stop();
            isRecording = false;
            document.getElementById('toggleBtn').classList.remove('recording');
            document.getElementById('toggleBtn').innerText = "🎙️ Start Listening";
        }
    });

</script>

</body>
</html>
