<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SkillCraft Studios</title>
        <style>
            :root {
                --green-theme: #0c0;
                --gold-theme: #aa0;

                --sun-dir: 220deg;

                /* Fonts */
                --body-font: sans-serif;
                --heading-font: monospace, sans-serif;

                /* Font sizes */
                --size-h1: clamp(3.4rem, 5vw + 1rem, 5rem);
                --size-h2: clamp(2.6rem, 5vw + 1rem, 3.5rem);
                --size-h3: clamp(1.8rem, 5vw + 1rem, 2.25rem);
                --size-body: clamp(1.25rem, calc(3vw + 0.25rem), 1.5rem);
                
                
                /* Line heights and letter spacing */
                --line-height-body: 1.6;
                --line-height-tight: 1.2;
                --letter-spacing-wide: 0.05em;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }


            body {
                height: 100vh; width: 100%;
                
                background-image: repeating-linear-gradient(
                    to right,
                    rgba(255,255,200,0.5) 0 1.5rem,
                    rgba(80,80,0,0.5) 1.5rem 1.6rem
                ), repeating-linear-gradient(
                    to bottom,
                    rgba(255,255,200,0.5) 0 1.5rem,
                    rgba(80,80,0,0.5) 1.5rem 1.6rem
                );

                font-family: var(--body-font);
            }

            /* the "wooden sign on a tavern" effect */
            header {
                border: ridge 2rem rgb(20,20,0);
                padding: 1rem;
                margin: 0.5rem;
                box-shadow: 0.4rem 0.4rem 0.2rem black;

                background-image: repeating-radial-gradient(
                    ellipse at 0% 100%, 
                    transparent 0% 5%, 
                    rgb(60,60,0) 5% 6%
                ), linear-gradient(
                    220deg,
                    rgb(70,70,0), 
                    rgb(90,90,20)
                );
            }

            /* The "gold plated letters" effect */
            header h1 {
                font-family: var(--heading-font);
                font-size: var(--size-h1);
                color: rgb(40,40,0);
                text-shadow: 
                    0.2rem 0 0 var(--gold-theme),
                    0 0.2rem 0 var(--gold-theme),
                    0.2rem 0.2rem 0 var(--gold-theme),
                    0.2rem -0.2rem 0 var(--gold-theme),
                    -0.2rem 0 0 var(--gold-theme),
                    0 -0.2rem 0 var(--gold-theme),
                    -0.2rem -0.2rem 0 var(--gold-theme),
                    -0.2rem 0.2rem 0 var(--gold-theme),
                    0.4rem 0.4rem 0.2rem black;
            }

            /* the "carved into wood" effect */
            header p {
                font-family: var(--body-font);
                font-size: calc(var(--size-body) + 0.5rem);
                color: rgb(30,30,0);
                text-shadow: 
                    -0.05rem -0.05rem 0 rgb(20,20,0),
                    0.05rem 0.05rem 0 rgb(50,50,0);
            }


            .blob {
                position: absolute;
                animation: splat 0.2s forwards;
                opacity: 0.6;
                visibility: hidden;
                z-index: -1;
            }

            .b1 {width: 1rem; height: 1rem; border-radius: 40% 60% 80% 90% / 90% 80% 40% 20%; background: var(--green-theme); top: 30%; left: 20%; animation-delay: 0s;}
            .b2 {width: 1rem; height: 1rem; border-radius: 40% 20% 90% 80% / 80% 90% 60% 40%; background: rgb(0,0,255); top: 10%; left: 80%; animation-delay: 1s;}
            .b3 {width: 1rem; height: 1rem; border-radius: 80% 90% 40% 60% / 40% 20% 90% 80%; background: rgb(255,255,0); top: 30%; left: 40%; animation-delay: 2s;}
            .b4 {width: 1rem; height: 1rem; border-radius: 90% 80% 40% 20% / 40% 60% 80% 90%; background: rgb(255,0,0); top: 5%; left: 60%; animation-delay: 3s;}
            
            @keyframes splat {
                0% {visibility: visible; transform: scale(0.1); filter: blur(0px);}
                100% {visibility: visible; transform: scale(30); filter: blur(0.5px);}
            }

            .paint {
                position: absolute;
                height: 80px;
                border-radius: 50% 50% 75% 75% / 20% 20% 100% 100%;
                animation: drip 10s forwards;
                opacity: 0.5;
                visibility: hidden;
                z-index: -2;
            }

            .p1 {width: 80px; background: var(--green-theme); top: 30%; left: 20%; animation-delay: 1s;}
            .p2 {width: 100px; background: rgb(0,0,255); top: 10%; left: 80%; animation-delay: 2s;}
            .p3 {width: 60px; background: rgb(255,255,0); top: 30%; left: 40%; animation-delay: 3s;}
            .p4 {width: 120px; background: rgb(255,0,0); top: 5%; left: 60%; animation-delay: 4s;}

            @keyframes drip {
                0% {visibility: visible; transform: translate(0,0) scale(0); filter: blur(0px);}
                100% {visibility: visible;transform: translate(0,400px) scale(1,8); filter: blur(2px);}
            }

            .gallery {
                display: flex;
                flex-wrap: wrap;
                flex-wrap: wrap;
                gap: 1rem;
                justify-content: center;
                padding: 2rem;
            }

            .card {
                width: 20rem; height: 25rem;
                padding: 1rem;
                background-image: linear-gradient(
                    220deg, 
                    rgba(255,255,255, 0.5),
                    rgba(255,255,255,0.3)
                );
                backdrop-filter: blur(0.2rem);
                border: ridge 2rem rgba(255,255,255,0.5);
                box-shadow: 
                    inset -0.2rem -0.2rem 0 rgba(255,255,255,1), 
                    inset 0.2rem 0.2rem 0 rgba(0,0,0,0.5);
                
                transition: width 0.3s, height 0.3s, transform 0.3s;
            }

            .card:hover {
                width: 25rem; height: 30rem;
                animation: shine 0.3s forwards;
            }

            @keyframes shine {
                0% {background-image: linear-gradient(135deg, rgba(255,255,0,1) 0, rgba(255,255,0,0.5) 10%,  rgba(255,255,255,0.3) 20% 100%);}
                20% {background-image: linear-gradient(135deg, rgba(255,255,255,0.5) 0 10%, rgba(255,255,0,1) 20%, rgba(255,255,0,0.5) 30%, rgba(255,255,255,0.3) 40% 100%);}
                40% {background-image: linear-gradient(135deg, rgba(255,255,255,0.5) 0 30%, rgba(255,255,0,1) 40%, rgba(255,255,0,0.5) 50%, rgba(255,255,255,0.3) 60% 100%);}
                60% {background-image: linear-gradient(135deg, rgba(255,255,255,0.5) 0 50%, rgba(255,255,0,1) 60%, rgba(255,255,0,0.5) 70%, rgba(255,255,255,0.3) 80% 100%);}
                80% {background-image: linear-gradient(135deg, rgba(255,255,255,0.5) 0 70%, rgba(255,255,0,1) 80%, rgba(255,255,0,0.5) 90%, rgba(255,255,255,0.3) 100%);}
                100% {background-image: linear-gradient(135deg, rgba(255,255,255,0.5), rgba(255,255,255,0.3));}
                
            }

        </style>
    </head>
    
    <body>
        <header>
            <h1>SkillCraft Studios</h1>
            <p>Group Activities - Creative Pursuits - Technical Skills</p>
            <nav>

            </nav>
        </header>
        
        <div class="blob b1"> </div>
        <div class="paint p1"> </div>
        <div class="blob b2"> </div>
        <div class="paint p2"> </div>
        <div class="blob b3"> </div>
        <div class="paint p3"> </div>
        <div class="blob b4"> </div>
        <div class="paint p4"> </div>

        <main>
            <div class="gallery">
                <h2 style="width:100%; text-align: center;">Gallery</h2>
                <div class="card"> 
                    <h3>sup</h3>
                    <p>this is a card</p>
                </div>
                <div class="card"> 
                    <h3>sup</h3>
                    <p>this is a card</p>
                </div>
                <div class="card"> 
                    <h3>sup</h3>
                    <p>this is a card</p>
                </div>
                
            </div>


        </main>
    </body>
</html>
