<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #fff;
            overflow-x: hidden;
        }
        .blob {
            position: absolute; width: 300px; height: 300px;
            background: #ffec3d;
            filter: blur(80px);
            z-index: -1; top: -50px; left: -50px;
        }
        nav { display: flex; justify-content: space-between; padding: 20px; font-weight: 900; font-size: 1.5rem;}
        .gallery {
            display: flex; gap: 20px; padding: 20px; overflow-x: scroll;
        }
        .gallery-item {
            min-width: 200px; height: 250px;
            background: #333;
            transform: rotate(-2deg);
            border: 8px solid white;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .gallery-item:nth-child(even) { transform: rotate(3deg); background: #ff4757; }
        .gallery-item:hover { transform: rotate(0deg) scale(1.05); }
        .newsletter-box {
            margin: 40px; padding: 30px;
            background: #2f3542; color: white;
            border-radius: 50px 10px 50px 10px;
        }
    </style>
</head>
<body>
    <div class="blob"></div>
    <nav><div>SKILLCRAFT</div><div>STUDIOS</div></nav>
    <h2 style="padding: 20px;">The Gallery of Messy Excellence</h2>
    <div class="gallery">
        <div class="gallery-item"></div>
        <div class="gallery-item"></div>
        <div class="gallery-item"></div>
    </div>
    <div class="newsletter-box">
        <h2>Stay in the Loop</h2>
        <input type="email" placeholder="Email address...">
        <button style="background:#ffec3d; border:none; padding: 10px;">JOIN</button>
    </div>
</body>
</html>
