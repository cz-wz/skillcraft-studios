<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Paint Splat Animation</title>
  <style>
    :root{--size:160px}
    html,body{height:100%;margin:0;background:#111}

    /* this position is set to relative because the splats are positioned absolute, so they will be positioned relative to this container */
    .stage{position:relative;width:100%;height:100%;overflow:hidden}

    /* this is the base style for each splat;
    the mix-blend-mode:screen makes it so the colors of the splats blend together and with the background,
    the opacity:0 makes it so the splats are invisible until the animation starts */
    .splat{
      position:absolute; width:var(--size); height:var(--size);
      transform-origin:center; border-radius:50%;
      filter:blur(0.5px) drop-shadow(0 8px 12px rgba(0,0,0,0.5));
      mix-blend-mode:screen; opacity:0;
    }

    /* this creates the shine and shadow; 
    the mix-blend-mode makes it so the shine and shadow only show on the splat, not on the background */
    .splat::before{
      content:""; position:absolute; inset:0; border-radius:50%;
      background:radial-gradient(circle at 30% 25%, rgba(255,255,255,0.25), transparent 15%), radial-gradient(circle at 55% 65%, rgba(0,0,0,0.12), transparent 40%);
      mix-blend-mode:overlay; pointer-events:none;
    }

    /* this sets the colors of each splat*/
    .red{background: radial-gradient(circle at 35% 35%, #ff6b6b, #c92a2a);}
    .blue{background: radial-gradient(circle at 35% 35%, #6ec1ff, #1868d6);}
    .green{background: radial-gradient(circle at 35% 35%, #7ef08a, #1f8a3a);}
    .yellow{background: radial-gradient(circle at 35% 35%, #ffef7a, #e0b800);}

    /* this creates the drip that falls after the splat appears;*/
    .splat::after{
      content:""; position:absolute; left:50%; top:80%; width:18%; height:18%; transform:translateX(-50%);
      border-radius:50% 50% 60% 60% / 50% 50% 70% 70%; background:rgba(0,0,0,0.05);
      opacity:0; pointer-events:none;
    }

    /* this scales the splat up from a small point to its full size */
    @keyframes pop {
      0%{transform:scale(0.02) translateY(0); opacity:1}
      100%{transform:scale(1) translateY(0); opacity:1}
    }

    /* this stretches the splat downwards and makes it fall and fade out */
    @keyframes drip {
      0%{transform:translateY(0) scaleY(1) scaleX(1); opacity:1}
      20%{transform:translateY(10px) scaleY(1.1) scaleX(0.95)}
      60%{transform:translateY(160px) scaleY(2.2) scaleX(0.6); opacity:0.95}
      100%{transform:translateY(320px) scaleY(3) scaleX(0.45); opacity:0}
    }

    /* this reveals the drip as the splat falls */
    @keyframes dropReveal{
      0%{opacity:0; transform:translateX(-50%) scaleY(0.6)}
      25%{opacity:1}
      100%{opacity:1; transform:translateX(-50%) translateY(320px) scaleY(3)}
    }

  
    .splat{animation: pop 0.5s ease-out forwards, drip 3s ease-in forwards;}
    .splat::after{animation: dropReveal 3s ease-in forwards; animation-delay:0.5s}

    /*this sets the location and timing of each splat */
    .s1{left:12%; top:12%; animation-delay:0s, 0.5s}
    .s2{left:62%; top:8%; animation-delay:1s, 1.5s}
    .s3{left:18%; top:40%; animation-delay:2s, 2.5s}
    .s4{left:60%; top:36%; animation-delay:3s, 3.5s}

    /* this uses ::after instead of ::before because the radial gradients for the colors are already using ::before, so we use ::after for the drips */
    .red::after{background: radial-gradient(circle at 50% 30%, rgba(255,107,107,0.95), rgba(201,42,42,0.95));}
    .blue::after{background: radial-gradient(circle at 50% 30%, rgba(110,193,255,0.95), rgba(24,104,214,0.95));}
    .green::after{background: radial-gradient(circle at 50% 30%, rgba(126,240,138,0.95), rgba(31,138,58,0.95));}
    .yellow::after{background: radial-gradient(circle at 50% 30%, rgba(255,239,122,0.95), rgba(224,184,0,0.95));}

    @media (max-width:600px){:root{--size:110px}}
  </style>
</head>
<body>
  <div class="stage">
    <!-- these div elements use multiple classes because each splat has a unique position and animation delay -->
    <div class="splat red s1"></div>
    <div class="splat blue s2"></div>
    <div class="splat green s3"></div>
    <div class="splat yellow s4"></div>
  </div>
</body>
</html>
